general {
    immediate_render = false
    grace = 0
}

background {
    monitor =
    path = ~/.config/stuff/space.jpg
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 0
    blur_size = 0
    noise = 0
    contrast = 0
    brightness = 0
    vibrancy = 0
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = ABO AYMAN RETURNS!
    color = #e0d8c7
    font_size = 14
    font_family = "0xProto Nerd Font Bold"
    position = 0, -140
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 340, 50
    outline_thickness = 2

    # Show characters as you type
    hide_input = true

    # Dots config (used if hide_input were true – keeping as fallback)
    dots_size = 0.20
    dots_spacing = 0.25
    dots_center = true
    dots_rounding = -1
    dots_color = #c4a7e7

    fade_on_empty = false

    # Fail text
    fail_text = $FAIL <b>($ATTEMPTS)</b>
    fail_transition = 300

    # Position (centered)
    position = 0, -80
    halign = center
    valign = center

    # Colors
    inner_color = rgba(24, 22, 28, 0.25)
    outer_color = rgba(196, 167, 231, 0.75)
    outline_color = #c4a7e7
    color = rgba(0, 0, 0, 0)

    # ─── RGB Check & Fail Colors ────────────────────────────
    # Gradient for the RGB "play" effect while checking
    check_color = rgb(196, 167, 231)   # purple → gold → teal transition
    # You can also use a gradient like:
    # check_color = rgba(196, 167, 231, 0.8) rgba(217, 178, 124, 0.8) rgba(144, 197, 169, 0.8)

    fail_color = #be4678               # red on failure
    fail_timeout = 2000                # 2 seconds before clearing fail state

    font_color = #e0d8c7
    font_family = "0xProto Nerd Font"
}


label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = #d9b27c
    font_size = 20
    font_family = "0xProto Nerd Font Bold"
    position = 0, 260
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = #c4a7e7
    font_size = 93
    font_family = "0xProto Nerd Font Bold"
    position = 0, 340
    halign = center
    valign = center
}
